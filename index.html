<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;
  background:#05060a;color:#fff;overflow-x:hidden;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* Анимированный фоновый градиент */
.bg-gradient{
  position:fixed;inset:0;z-index:-2;
  background:radial-gradient(circle at 20% 10%,rgba(0,200,255,0.15),transparent 40%),
             radial-gradient(circle at 80% 80%,rgba(120,80,255,0.12),transparent 45%),
             radial-gradient(circle at 50% 50%,rgba(0,255,200,0.08),transparent 50%);
  animation:bgMove 20s ease-in-out infinite alternate;
}
@keyframes bgMove{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(-30px,40px) scale(1.1)}
}
.grid-bg{
  position:fixed;inset:0;z-index:-1;opacity:0.3;
  background-image:linear-gradient(rgba(0,200,255,0.05) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,200,255,0.05) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);
}

/* Top bar */
.topbar{
  background:linear-gradient(90deg,#00d4ff,#7c3aed);
  text-align:center;padding:10px 16px;font-size:12px;font-weight:700;
  letter-spacing:0.5px;color:#fff;position:relative;overflow:hidden;
}
.topbar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shine 3s linear infinite;
}
@keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* Header */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(5,6,10,0.7);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,212,255,0.15);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,#ff6b9d,#ffd93d);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;color:#000;line-height:1;text-align:center;
  box-shadow:0 4px 20px rgba(255,107,157,0.4);
  flex-shrink:0;
}
.logo-text-small{font-size:11px;font-weight:900;color:#000}
.logo-text-tiny{font-size:7px;font-weight:700;color:#1a4d8f;margin-top:1px}
.logo-info .name{font-size:13px;font-weight:800;letter-spacing:0.3px}
.logo-info .desc{font-size:10px;color:#7a8599;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.btn-header{
  background:linear-gradient(135deg,#00d4ff,#0099ff);
  color:#000;font-weight:800;padding:11px 18px;border-radius:12px;
  text-decoration:none;font-size:13px;letter-spacing:0.5px;
  box-shadow:0 4px 20px rgba(0,212,255,0.4);
  transition:transform 0.2s,box-shadow 0.2s;
  white-space:nowrap;
}
.btn-header:active{transform:scale(0.96)}

/* Sections */
section{padding:60px 20px;position:relative}
.label{
  display:inline-block;font-size:11px;font-weight:800;
  color:#00d4ff;letter-spacing:2px;margin-bottom:14px;
  text-transform:uppercase;
}
h1,h2{
  font-weight:900;line-height:0.95;letter-spacing:-2px;
  text-transform:uppercase;
}
h1{font-size:clamp(38px,11vw,68px);margin-bottom:20px}
h2{font-size:clamp(34px,9vw,56px);margin-bottom:24px}
.gradient-text{
  background:linear-gradient(135deg,#00d4ff 0%,#7c3aed 50%,#ff00aa 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:200% 200%;
  animation:gradientMove 4s ease infinite;
}
@keyframes gradientMove{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

/* HERO */
.hero{padding-top:50px;padding-bottom:40px}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
  padding:10px 16px;border-radius:100px;font-size:12px;font-weight:700;
  color:#00d4ff;margin-bottom:24px;backdrop-filter:blur(10px);
}
.dot{width:8px;height:8px;background:#00ff88;border-radius:50%;
  box-shadow:0 0 10px #00ff88;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.price-compare{
  background:rgba(20,22,30,0.6);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;padding:24px;margin:30px 0;
  display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;
  position:relative;overflow:hidden;
}
.price-compare::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(0,212,255,0.05));
  pointer-events:none;
}
.price-block{text-align:center;position:relative;z-index:1}
.price-block .label-mini{font-size:11px;color:#7a8599;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;font-weight:700}
.price-block .old-price{font-size:32px;font-weight:900;color:#7a8599;text-decoration:line-through;text-decoration-color:#ff3366;text-decoration-thickness:3px}
.price-block .new-price{font-size:32px;font-weight:900;
  background:linear-gradient(135deg,#00d4ff,#00ff88);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.price-block .sub{font-size:11px;color:#7a8599;margin-top:6px}
.discount-badge{
  background:linear-gradient(135deg,#00d4ff,#7c3aed);
  color:#fff;font-weight:900;padding:10px 14px;border-radius:14px;
  font-size:14px;text-align:center;
  box-shadow:0 0 30px rgba(0,212,255,0.5);
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
.discount-badge .arrow{font-size:18px;display:block;margin-bottom:2px}

.hero-text{font-size:16px;color:#a8b3c7;margin:24px 0;line-height:1.6}
.hero-text b{color:#fff}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin:24px 0}
.tag{
  background:rgba(20,22,30,0.6);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  padding:9px 14px;border-radius:100px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
}

/* CTA Buttons */
.btn-primary{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#00d4ff 0%,#0099ff 50%,#7c3aed 100%);
  background-size:200% 100%;
  color:#fff;font-weight:800;padding:20px 24px;border-radius:18px;
  text-decoration:none;font-size:15px;letter-spacing:1px;
  box-shadow:0 10px 40px rgba(0,212,255,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
  text-transform:uppercase;width:100%;margin:12px 0;
  position:relative;overflow:hidden;
  transition:transform 0.2s,background-position 0.5s;
}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:hover{background-position:100% 0}
.btn-primary::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:btnShine 3s ease-in-out infinite;
}
@keyframes btnShine{0%{left:-100%}50%,100%{left:100%}}

.btn-secondary{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:rgba(20,22,30,0.6);backdrop-filter:blur(10px);
  border:1px solid rgba(0,212,255,0.3);
  color:#fff;font-weight:800;padding:18px 24px;border-radius:18px;
  text-decoration:none;font-size:14px;letter-spacing:1px;
  text-transform:uppercase;width:100%;margin:8px 0;
  transition:transform 0.2s,border-color 0.2s;
}
.btn-secondary:active{transform:scale(0.98)}

.cta-meta{
  display:flex;justify-content:center;gap:14px;flex-wrap:wrap;
  font-size:12px;color:#7a8599;margin:14px 0;
}
.cta-meta span{display:inline-flex;align-items:center;gap:4px}

/* STATS */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin:40px 0;padding:24px 16px;
  background:rgba(20,22,30,0.4);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.06);border-radius:20px;
}
.stat{text-align:center}
.stat .num{
  font-size:clamp(20px,6vw,28px);font-weight:900;
  background:linear-gradient(135deg,#00d4ff,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat .lbl{font-size:9px;color:#7a8599;letter-spacing:1px;margin-top:4px;text-transform:uppercase;font-weight:700}

/* FEATURES */
.feature{
  background:rgba(20,22,30,0.5);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.06);border-radius:20px;
  padding:22px;margin-bottom:14px;
  display:flex;gap:16px;align-items:flex-start;
  position:relative;overflow:hidden;
  transition:transform 0.3s,border-color 0.3s;
}
.feature::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,#00d4ff,#7c3aed);
  opacity:0;transition:opacity 0.3s;
}
.feature:hover{transform:translateX(4px);border-color:rgba(0,212,255,0.3)}
.feature:hover::before{opacity:1}
.feature-icon{
  width:50px;height:50px;border-radius:14px;
  background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(124,58,237,0.15));
  border:1px solid rgba(0,212,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:24px;
  flex-shrink:0;
}
.feature-content h3{font-size:17px;font-weight:800;margin-bottom:6px}
.feature-content p{font-size:14px;color:#a8b3c7;line-height:1.5}
.feature-content p b{color:#00d4ff}

/* TABLE */
.table-wrap{
  background:rgba(20,22,30,0.5);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);border-radius:20px;overflow:hidden;
  margin:24px 0;
}
table{width:100%;border-collapse:collapse}
th{
  background:rgba(0,212,255,0.05);
  padding:14px;text-align:left;font-size:11px;
  color:#7a8599;letter-spacing:1px;font-weight:800;text-transform:uppercase;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
th:nth-child(2),th:nth-child(3){text-align:right}
td{
  padding:16px 14px;font-size:15px;font-weight:700;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
tr:last-child td{border-bottom:none}
tr.hit{background:linear-gradient(90deg,rgba(0,212,255,0.08),transparent);
  position:relative}
tr.hit::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,#00d4ff,#7c3aed);
}
.old{color:#7a8599;text-decoration:line-through;text-align:right;font-weight:600}
.new{
  text-align:right;font-weight:900;
  background:linear-gradient(135deg,#00d4ff,#00ff88);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hit-badge{
  display:inline-block;font-size:9px;font-weight:900;
  background:linear-gradient(135deg,#ff00aa,#7c3aed);
  color:#fff;padding:3px 8px;border-radius:6px;margin-left:6px;
  letter-spacing:1px;vertical-align:middle;
}

/* STEPS */
.steps{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:24px 0}
.step{
  background:rgba(20,22,30,0.5);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.06);border-radius:20px;
  padding:24px 18px;text-align:center;
  transition:transform 0.3s,border-color 0.3s;
}
.step:hover{transform:translateY(-4px);border-color:rgba(0,212,255,0.3)}
.step-num{
  font-size:48px;font-weight:900;line-height:1;margin-bottom:14px;
  background:linear-gradient(135deg,#00d4ff,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.step h3{font-size:15px;font-weight:800;margin-bottom:8px}
.step p{font-size:13px;color:#a8b3c7;line-height:1.5}
.step-3{
  grid-column:1/-1;
  background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(124,58,237,0.08));
  border-color:rgba(0,212,255,0.3);
  display:grid;grid-template-columns:auto 1fr;gap:18px;text-align:left;align-items:center;
}
.step-3 .step-num{margin-bottom:0;font-size:64px}

/* REVIEWS */
.review{
  background:rgba(20,22,30,0.5);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.06);border-radius:20px;
  padding:22px;margin-bottom:14px;position:relative;
}
.stars{color:#ffb800;font-size:14px;letter-spacing:2px;margin-bottom:12px}
.review-text{font-size:14px;color:#d4dae8;line-height:1.6;margin-bottom:16px}
.review-author{display:flex;align-items:center;gap:12px}
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,#00d4ff,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;font-size:16px;flex-shrink:0;
}
.author-info .name{font-size:14px;font-weight:800}
.author-info .when{font-size:12px;color:#7a8599;margin-top:2px}

/* GUARANTEES */
.guarantee{
  background:rgba(20,22,30,0.5);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.06);border-radius:18px;
  padding:18px;margin-bottom:12px;
  display:flex;gap:14px;align-items:center;
}
.g-icon{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(124,58,237,0.15));
  border:1px solid rgba(0,212,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.guarantee p{font-size:14px;color:#a8b3c7;line-height:1.5}
.guarantee p b{color:#00d4ff;font-weight:800}

/* FINAL CTA */
.final-cta{text-align:center;padding-top:40px}
.final-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
  padding:10px 16px;border-radius:100px;font-size:12px;font-weight:700;
  color:#00d4ff;margin-bottom:20px;
}

/* FOOTER */
footer{
  text-align:center;padding:30px 20px 40px;
  border-top:1px solid rgba(255,255,255,0.05);margin-top:30px;
  font-size:12px;color:#5a6478;
}

/* ANIMATIONS */
.fade-up{opacity:0;transform:translateY(40px);transition:opacity 0.8s,transform 0.8s}
.fade-up.visible{opacity:1;transform:translateY(0)}
.fade-up:nth-child(2){transition-delay:0.1s}
.fade-up:nth-child(3){transition-delay:0.2s}
.fade-up:nth-child(4){transition-delay:0.3s}
.fade-up:nth-child(5){transition-delay:0.4s}

@media(min-width:600px){
  .price-compare{grid-template-columns:1fr auto 1fr}
}
</style>
</head>

<!-- HERO -->
<section class="hero">
  <div class="hero-badge fade-up">
    <span class="dot"></span> ЦЕ
